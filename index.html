<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#141824">
<title>Projeto Rafa — Leitor de Texto por Voz</title>
<meta name="description" content="Cole um texto e ouça em voz alta, direto no navegador. Sem downloads, sem cadastro.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>🔊 Projeto Rafa</h1>
  <p class="subtitle">Cole um texto e ouça em voz alta</p>
</header>

<main>
  <section class="controls-card" aria-label="Controles de reprodução">
    <div class="primary-row">
      <button id="btnPlay" class="btn btn-primary" type="button">
        <span class="icon" aria-hidden="true">▶</span> Ouvir
      </button>
      <button id="btnPause" class="btn btn-secondary" type="button" disabled>
        <span class="icon" aria-hidden="true">⏸</span> Pausar
      </button>
      <button id="btnResume" class="btn btn-secondary" type="button" disabled hidden>
        <span class="icon" aria-hidden="true">▶</span> Retomar
      </button>
      <button id="btnStop" class="btn btn-danger" type="button" disabled>
        <span class="icon" aria-hidden="true">■</span> Parar
      </button>
    </div>

    <div class="progress-wrap" aria-hidden="false">
      <div class="progress-track">
        <div id="progressBar" class="progress-fill"></div>
      </div>
      <span id="progressLabel" class="progress-label">Pronto</span>
    </div>

    <details class="settings">
      <summary>Configurações de voz</summary>
      <div class="settings-body">
        <div class="field">
          <label for="rateRange">Velocidade: <span id="rateValue">1.0x</span></label>
          <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="field">
          <label for="voiceSelect">Voz</label>
          <select id="voiceSelect"></select>
          <p id="voiceWarning" class="warning" hidden></p>
        </div>
      </div>
    </details>
  </section>

  <section class="text-card">
    <div class="text-card-header">
      <label for="textInput">Seu texto</label>
      <button id="btnClear" class="btn btn-link" type="button">Limpar</button>
    </div>
    <textarea id="textInput" placeholder="Cole aqui o texto que você quer ouvir..." autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <p id="charCount" class="char-count">0 caracteres</p>
  </section>

  <p id="unsupportedMsg" class="unsupported" hidden>
    Seu navegador não suporta leitura de texto por voz (Web Speech API). Tente usar o Chrome atualizado.
  </p>
</main>

<footer class="footer">
  <p>Projeto Rafa · leitura de texto local no seu navegador, sem envio de dados a servidores.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
